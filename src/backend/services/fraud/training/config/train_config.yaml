modeling:
  fraud_threshold_days: 15
  test_last_months: 1
  # Date format for serialization (not used for ML - timestamps preferred)
  date_format: "%Y-%m-%d"
  # Use Unix timestamps for ML features (int, seconds since epoch)
  use_timestamp: true
  target_column: dunning_days
  target_column_is_fraud: "dunning_days > 15"

data:
  date_column: created
  checkout_table: checkouts
  customer_table: customers
  charges_table: charges
  payment_intents_table: payment_intents

segments:
  NEW_CUSTOMER:
    description: "First time customer"
    threshold: 0.5
  RETURNING:
    description: "Returning customer"
    threshold: 0.8

features:
  realtime:
    - customer_match_scores
    - customer_demographics
    - checkout_value
    - checkout_grade
    - checkout_category
    - checkout_addons

  batch:
    email_aggregations:
      - dunning_days_max
      - dunning_days_mean
      - payment_failure_rate
      - total_checkouts
      - total_subscription_value
      - high_end_count

feature_store:
  redis_host: localhost
  redis_port: 6379
  key_pattern: "features:email:{email}"

training:
  # Time-based split (arbitrary dates - adjust based on data range)
  # Test has less data because dataset ends Oct 7, 2024
  train_start: "2024-01-01"
  train_end: "2024-08-01"
  val_start: "2024-08-01"
  val_end: "2024-09-01"
  test_start: "2024-09-01"
  test_end: "2024-10-31"
