# Training pipeline configuration

# Data paths
data:
  training_dir: "data/04-modeling"
  date_column: "created"
  checkout_table: "checkouts"
  customer_table: "customers"
  charges_table: "charges"
  payment_intents_table: "payment_intents"

# Fraud label threshold (days)
modeling:
  fraud_threshold_days: 15
  target_column: "dunning_days"
  target_is_fraud: "dunning_days > 15"

# Time-based split dates
dates:
  train_start: "2024-03-01"
  train_end: "2024-08-05"
  val_start: "2024-08-05"
  val_end: "2024-08-10"
  test_start: "2024-08-10"
  test_end: "2024-08-31"

# MLflow configuration
mlflow:
  experiment_name: "fraud-detector"
  model_name: "fraud-detector"
  tracking_uri: "http://localhost:5002"
